name: Build and push openclaw image

on:
  # 北京时间(UTC+8) 每天 08:00 和 17:00 => UTC 00:00 和 09:00
  # 整点排队严重，错开几分钟以减少延迟
  schedule:
    - cron: "7 0 * * *"   # 北京时间 08:07 左右
    - cron: "7 9 * * *"   # 北京时间 17:07 左右
  # 支持手动触发
  workflow_dispatch:
  # 改动 Dockerfile 或工作流时也构建一次
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build.yml

concurrency:
  group: build-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD-HHmm'}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # 始终拉取最新的上游 openclaw 基础镜像
          pull: true
          no-cache: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
